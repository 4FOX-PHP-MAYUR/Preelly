# Adaptive video streaming stack (API + FFmpeg worker + MongoDB)
# Usage: docker compose -f docker-compose.streaming.yml up --build

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8029:8029'
    environment:
      NODE_ENV: production
      PORT: 8029
      MONGO_URI: mongodb://mongo:27017/olx_reels
      BASE_URL: http://localhost:8029
      FRONTEND_URL: http://localhost:8031
      ADMIN_URL: http://localhost:8030
      VIDEO_STORAGE_PROVIDER: local
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      MAX_STREAMING_UPLOAD_MB: 500
    volumes:
      - ./api/uploads:/app/uploads
    depends_on:
      - mongo

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - '8031:8031'
    environment:
      VITE_API_URL: http://localhost:8029/api
      VITE_SOCKET_URL: http://localhost:8029
      VITE_ADMIN_URL: http://localhost:8030
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    restart: unless-stopped
    ports:
      - '8030:8030'
    environment:
      VITE_API_URL: http://localhost:8029/api
      VITE_SOCKET_URL: http://localhost:8029
    depends_on:
      - api

volumes:
  mongo_data:
