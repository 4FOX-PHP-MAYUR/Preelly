# Adaptive video streaming stack (API + FFmpeg worker + MongoDB)
# Usage: docker compose -f docker-compose.streaming.yml up --build

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '5002:5002'
    environment:
      NODE_ENV: production
      PORT: 5002
      MONGO_URI: mongodb://mongo:27017/olx_reels
      BASE_URL: http://localhost:5002
      FRONTEND_URL: http://localhost:3002
      VIDEO_STORAGE_PROVIDER: local
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      MAX_STREAMING_UPLOAD_MB: 500
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - mongo

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      VITE_API_URL: http://localhost:5002/api
      VITE_SOCKET_URL: http://localhost:5002
    depends_on:
      - api

volumes:
  mongo_data:
